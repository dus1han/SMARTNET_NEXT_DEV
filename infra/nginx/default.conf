# Routing table, over TLS.
#
# This host has NO legacy app — the new Next.js + API stack is the whole
# application, so `location /` serves the new web app directly.
#
# It did not, and that was the 504: `location /` proxied to an upstream at
# host.docker.internal:8081 that nothing was listening on, so every root request
# hung until nginx gave up. The strangler structure below is kept as
# documentation of the intended shape; there is simply nothing to fall back to
# on this host.
#
# ---------------------------------------------------------------------------
# FIRST DEPLOY: the certificate has to exist before nginx will start
# ---------------------------------------------------------------------------
# The 443 block below references a certificate file. If it is not there, nginx
# refuses to start — and certbot cannot obtain one without nginx already serving
# the ACME challenge on :80. That circle has to be broken once, by hand, on the
# server:
#
#   1. Comment out the whole `server { listen 443 ... }` block below.
#   2. docker compose up -d nginx          # serves :80 only, which is enough
#   3. docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
#        -d sys.smart-net.lk --agree-tos -m <you@example.com> --no-eff-email
#   4. Uncomment the 443 block, then: docker compose up -d --force-recreate nginx
#
# After that the certbot service renews it unattended and this never recurs.
# ---------------------------------------------------------------------------

upstream new_api  { server api:5080; }
upstream new_web  { server web:3000; }

# ---------------------------------------------------------------------------
# Port 80 — ACME, and a redirect for everything else.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name sys.smart-net.lk;

    # Must stay on :80 and must NOT be redirected: Let's Encrypt fetches this
    # over plain HTTP, and a 301 here fails every renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Port 443 — the real routing table.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name sys.smart-net.lk;

    ssl_certificate     /etc/letsencrypt/live/sys.smart-net.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sys.smart-net.lk/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Document uploads are larger than nginx's 1m default; a rejected upload
    # reads as a broken page.
    client_max_body_size 25m;

    # The API goes to the new stack. X-Forwarded-Proto tells it the original
    # request was HTTPS — see UseForwardedHeaders in Program.cs, which is why
    # the audit log records a real client address.
    location /api/ {
        proxy_pass         http://new_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health { proxy_pass http://new_api; }

    # Next.js assets.
    location /_next/ {
        proxy_pass       http://new_web;
        proxy_set_header Host $host;
    }

    # -----------------------------------------------------------------------
    # Everything else -> the new Next.js app. (No legacy on this host.)
    # -----------------------------------------------------------------------
    location / {
        proxy_pass         http://new_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
