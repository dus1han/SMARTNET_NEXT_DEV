# Strangler routing table.
#
# Everything defaults to the LEGACY app. As each module is ported, its path is
# moved into the "new stack" block above. One line per module. Reverting a bad
# cutover is deleting that line.
#
# Set LEGACY_UPSTREAM to wherever the old ASP.NET MVC app is served from.

upstream new_api  { server api:5080; }
upstream new_web  { server web:3000; }
upstream legacy   { server host.docker.internal:8081; }   # <- the existing MVC app

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # ---------------------------------------------------------------------
    # NEW STACK — ported modules only. Add a location block per module.
    # ---------------------------------------------------------------------

    # API always goes to the new stack.
    location /api/ {
        proxy_pass         http://new_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health { proxy_pass http://new_api; }

    # Next.js assets.
    location /_next/ {
        proxy_pass       http://new_web;
        proxy_set_header Host $host;
    }

    # --- Phase 1: uncomment as each module ships ---
    # location /login/    { proxy_pass http://new_web; }
    # location /settings/ { proxy_pass http://new_web; }
    # location /users/    { proxy_pass http://new_web; }

    # --- Phase 3 ---
    # location /customers/ { proxy_pass http://new_web; }
    # location /suppliers/ { proxy_pass http://new_web; }
    # location /items/     { proxy_pass http://new_web; }

    # ---------------------------------------------------------------------
    # LEGACY — the default. Everything not listed above still runs on the
    # old ASP.NET MVC app, against the same database.
    # ---------------------------------------------------------------------
    location / {
        proxy_pass         http://legacy;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
