# Build both images, push them to GHCR, then tell the server to pull and restart.
#
# The server never builds. It pulls what CI has already produced, so a deploy cannot fail halfway
# through a compile on a machine that is also serving traffic, and what runs in production is the exact
# artefact that was tested.
#
# Runs on main only. Development happens on branches; merging to main is the act that deploys.
name: Build and Deploy

on:
  push:
    branches: [main]

  # Deliberately available by hand as well: a redeploy after a server rebuild should not need a
  # meaningless commit to trigger it.
  workflow_dispatch:

concurrency:
  # One deploy at a time. Two overlapping runs would race on `docker compose up` and the later push
  # could finish first, leaving the older image running.
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lower-cased because GHCR rejects capitals in an image name and this repository has them.
      - name: Work out the image names
        id: names
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push the API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/${{ steps.names.outputs.repo }}-api:latest
            ghcr.io/${{ steps.names.outputs.repo }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The repository root, not apps/web: the app compiles against packages/api-client, which lives
      # outside apps/web. See apps/web/Dockerfile.
      - name: Build and push the web app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.names.outputs.repo }}-web:latest
            ghcr.io/${{ steps.names.outputs.repo }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Ship infra/ (compose + nginx routing) BEFORE pulling, so the server runs the config
          # from the repo, not a stale hand-placed copy. --delete makes the server a true mirror
          # (a removed nginx location block actually disappears); the production .env is safe
          # because it lives in /var/www/sys-secrets, outside this target. sql/ is a one-off DBA
          # script, not runtime, so it is excluded.
          rsync -az --delete --exclude 'sql/' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            infra/ "$SSH_USER@$SSH_HOST:/var/www/sys/"

          # --env-file points at the server-only secret (connection string, environment, cors).
          # pull: fetch the images CI just pushed. up -d --remove-orphans: apply, and stop any
          # service deleted from the compose file. nginx -s reload: re-read default.conf, since a
          # changed mounted file does not reload a running container on its own — this is what makes
          # each strangler cutover take effect.
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "cd /var/www/sys && \
             docker compose --env-file /var/www/sys-secrets/.env pull && \
             docker compose --env-file /var/www/sys-secrets/.env up -d --remove-orphans && \
             docker compose --env-file /var/www/sys-secrets/.env exec -T nginx nginx -s reload"