name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
        working-directory: apps/api
      # TreatWarningsAsErrors + banned-symbol analyzers are the real gate here:
      # double-typed money, raw SQL and DateTime.Now fail the build.
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: apps/api
      - name: Test
        run: dotnet test --no-build -c Release
        working-directory: apps/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx tsc --noEmit
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      # The money arithmetic the browser does for display. The server is the authority and re-computes
      # every total (DEVELOPMENT.md §8) — but the figure under the user's cursor has to be the figure
      # they are invoiced for, and ISSUES B1 is what happens when nobody checks that.
      - run: npm test
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  # The contract gate. packages/api-client is GENERATED from the API's OpenAPI schema, and a
  # generated file that nobody regenerates is a hand-written file with extra steps: somebody adds a
  # field to a C# DTO, does not regenerate, and the frontend goes on compiling against types that no
  # longer describe the API. TypeScript cannot catch that — it has never heard of the new field.
  #
  # This job regenerates the client and fails if the result differs from what is committed.
  # Fix: `npm run generate:api` in apps/web, and commit the result.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # The Swashbuckle CLI targets net9.0; DOTNET_ROLL_FORWARD (set in generate.sh) runs it on the
      # net10 runtime rather than installing a second one.
      - name: Install the Swagger CLI
        run: dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 7.2.0
      - name: Check the generated API client is up to date
        run: npm run check:api
        working-directory: apps/web
